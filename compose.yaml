services:
  postgres:
    image: postgres:15
    container_name: laravel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: laravel_db
      POSTGRES_USER: laravel_user
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel_user -d laravel_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "8000:80" # <-- Ajusta el "80" al puerto interno que exponga tu Dockerfile
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Variables core obligatorias para Laravel
      APP_NAME: "Aurum Flow"
      APP_ENV: production
      APP_KEY: "base64:PON_TU_APP_KEY_AQUI=" # <-- Reemplaza por tu key real
      APP_DEBUG: false
      APP_URL: "https://tu-dominio.com"
      
      # Variables de Base de Datos
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: laravel_db
      DB_USERNAME: laravel_user
      DB_PASSWORD: secret
      
      # Variables personalizadas
      FRESH_DB: "false"
      FLUX_EMAIL: valente.gar.daniel@gmail.com
      FLUX_KEY: a550edb3-99c9-430d-8af2-5abcd3820adb

volumes:
  pgdata:
  storage_data:
